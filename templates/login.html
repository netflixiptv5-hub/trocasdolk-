<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocas Dolk - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #12121a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-card .lock { font-size: 48px; margin-bottom: 16px; }
        .login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .login-card p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0a0f;
            border: 1px solid #1e293b;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #6366f1; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #818cf8; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .footer-text { margin-top: 32px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock">🔐</div>
        <h1>Trocas Dolk</h1>
        <p>Sistema de Suporte Administrativo</p>
        
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-msg">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" placeholder="Digite seu usuário" required autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <p class="footer-text">© 2026 Trocas Dolk - Todos os direitos reservados</p>
    </div>
</body>
</html>
